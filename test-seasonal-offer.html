<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Seasonal Offer Button Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
        }

        button:hover {
            background: #1d4ed8;
        }

        .info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <h1>🧪 Seasonal Offer Button Test</h1>

    <div class="info">
        <h3>Test-Anleitung:</h3>
        <ol>
            <li>Klicken Sie auf "Angebot erstellen"</li>
            <li>Geben Sie einen Titel ein (z.B. "Testangebot")</li>
            <li>Geben Sie eine Beschreibung ein (z.B. "20% Rabatt")</li>
            <li>Geben Sie die Anzahl Tage ein (z.B. "7")</li>
            <li>Überprüfen Sie die Console (F12) für Logs</li>
        </ol>
    </div>

    <button onclick="testCreateOffer()">🎯 Angebot erstellen (Test)</button>
    <button onclick="checkIfFunctionExists()">🔍 Funktion prüfen</button>
    <button onclick="viewCurrentOffer()">👁️ Aktuelles Angebot anzeigen</button>
    <button onclick="clearOffer()">🗑️ Angebot löschen</button>

    <div id="result"></div>

    <script src="script.js"></script>
    <script>
        function checkIfFunctionExists() {
            const result = document.getElementById('result');
            if (typeof createSeasonalOffer === 'function') {
                result.innerHTML = '<div class="success">✅ createSeasonalOffer Funktion existiert!</div>';
                console.log('Function exists:', createSeasonalOffer);
            } else {
                result.innerHTML = '<div class="error">❌ createSeasonalOffer Funktion NICHT gefunden!</div>';
                console.error('Function not found in window:', window.createSeasonalOffer);
            }
        }

        function testCreateOffer() {
            const result = document.getElementById('result');

            if (typeof createSeasonalOffer !== 'function') {
                result.innerHTML = '<div class="error">❌ Funktion nicht verfügbar!</div>';
                return;
            }

            try {
                console.log('Calling createSeasonalOffer...');
                createSeasonalOffer();
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Fehler: ${error.message}</div>`;
                console.error('Error:', error);
            }
        }

        function viewCurrentOffer() {
            const result = document.getElementById('result');
            const offerData = localStorage.getItem('druckbau_seasonal_offer');

            if (offerData) {
                const offer = JSON.parse(offerData);
                const endDate = new Date(offer.endDate);
                const now = new Date();
                const timeLeft = endDate - now;
                const daysLeft = Math.floor(timeLeft / (1000 * 60 * 60 * 24));

                result.innerHTML = `
                    <div class="success">
                        <h3>✅ Aktuelles Angebot:</h3>
                        <pre>${JSON.stringify(offer, null, 2)}</pre>
                        <p><strong>Verbleibende Zeit:</strong> ${daysLeft} Tage</p>
                        <p><strong>Status:</strong> ${offer.active ? 'Aktiv' : 'Inaktiv'}</p>
                    </div>
                `;
            } else {
                result.innerHTML = '<div class="info">ℹ️ Kein Angebot vorhanden</div>';
            }
        }

        function clearOffer() {
            localStorage.removeItem('druckbau_seasonal_offer');
            document.getElementById('result').innerHTML = '<div class="success">✅ Angebot gelöscht!</div>';
            console.log('Offer cleared from localStorage');
        }

        // Auto-check on load
        window.addEventListener('load', () => {
            checkIfFunctionExists();
        });
    </script>
</body>

</html>
